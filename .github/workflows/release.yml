name: Build & Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0         # нужно для git push обратно в репо
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Increment VERSION_PATCH in version.properties
        id: version
        run: |
          # Читаем текущие значения
          MAJOR=$(grep VERSION_MAJOR version.properties | cut -d= -f2 | tr -d '[:space:]')
          MINOR=$(grep VERSION_MINOR version.properties | cut -d= -f2 | tr -d '[:space:]')
          PATCH=$(grep VERSION_PATCH version.properties | cut -d= -f2 | tr -d '[:space:]')

          # Инкрементируем патч
          NEW_PATCH=$((PATCH + 1))

          # Записываем обратно
          sed -i "s/VERSION_PATCH=.*/VERSION_PATCH=$NEW_PATCH/" version.properties

          # Экспортируем переменные
          echo "version=$MAJOR.$MINOR.$NEW_PATCH" >> $GITHUB_OUTPUT
          echo "tag=v$MAJOR.$MINOR.$NEW_PATCH" >> $GITHUB_OUTPUT

          echo "Version: $MAJOR.$MINOR.$NEW_PATCH"

      - name: Commit updated version.properties
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config pull.rebase true
          git add version.properties
          git commit -m "ci: bump version to ${{ steps.version.outputs.version }} [skip ci]"
          git pull --rebase origin main
          git push

      - name: Set up JDK 17
        uses: actions/setup-java@v4.7.0
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/keystore.jks

      - name: Build and sign APK
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Verify APK signature
        run: |
          BUILD_TOOLS=$(ls $ANDROID_SDK_ROOT/build-tools/ | sort -V | tail -1)
          $ANDROID_SDK_ROOT/build-tools/$BUILD_TOOLS/apksigner verify \
            app/build/outputs/apk/release/GlucoPlan_${{ steps.version.outputs.version }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.2.1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "GlucoPlan ${{ steps.version.outputs.version }}"
          body: |
            Автоматическая сборка из коммита ${{ github.sha }}

            ${{ github.event.head_commit.message }}
          files: app/build/outputs/apk/release/GlucoPlan_*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
