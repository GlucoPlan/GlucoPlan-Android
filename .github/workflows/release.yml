name: Build & Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Для ручного запуска

permissions:
  contents: write

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up JDK 17
        uses: actions/setup-java@v4.7.0
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/keystore.jks
          echo "=== Keystore file info ==="
          file app/keystore.jks
          ls -la app/keystore.jks
          
      - name: Debug keystore (diagnostic)
        run: |
          echo "=== Testing keystore ==="
          keytool -list -v -keystore app/keystore.jks -storepass "${{ secrets.KEYSTORE_PASSWORD }}" 2>&1 || echo "KEYSTORE TEST FAILED"
          
      - name: Debug base64 (first 100 chars)
        run: |
          echo "=== First 100 chars of KEYSTORE_BASE64 ==="
          echo "${{ secrets.KEYSTORE_BASE64 }}" | cut -c1-100
          echo "..."
          echo "Length: $(echo -n "${{ secrets.KEYSTORE_BASE64 }}" | wc -c)"

      - name: Build and sign APK
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Verify APK signature
        if: success()  # Только если сборка успешна
        run: |
          BUILD_TOOLS=$(ls $ANDROID_SDK_ROOT/build-tools/ | sort -V | tail -1)
          $ANDROID_SDK_ROOT/build-tools/$BUILD_TOOLS/apksigner verify \
            app/build/outputs/apk/release/app-release.apk

      - name: Get version name
        id: version
        if: success()  # Только если сборка успешна
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | grep -oP '"\K[^"]+')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION-$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: success()  # Только если сборка успешна
        uses: softprops/action-gh-release@v2.2.1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "GlucoPlan ${{ steps.version.outputs.version }}"
          body: |
            Автоматическая сборка из коммита ${{ github.sha }}
            
            Подписанный APK готов к установке.
          files: app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
