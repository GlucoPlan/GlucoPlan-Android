name: Build & Release APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      # 1. Получаем код
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Ставим JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. Кешируем Gradle
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml') }}
          restore-keys: gradle-

      # 4. Даём права на gradlew
      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # 5. Запускаем unit-тесты
      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      # 6. Собираем release APK
      - name: Build release APK
        run: ./gradlew assembleRelease

      # 7. Подписываем APK (если есть keystore в секретах)
      - name: Sign APK
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      # 8. Берём номер версии из build.gradle
      - name: Get version name
        id: version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | grep -oP '"\K[^"]+')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION-$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_OUTPUT

      # 9. Создаём GitHub Release и прикладываем APK
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "GlucoPlan ${{ steps.version.outputs.version }}"
          body: |
            Автоматическая сборка из коммита ${{ github.sha }}
            
            ${{ github.event.head_commit.message }}
          files: |
            app/build/outputs/apk/release/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
